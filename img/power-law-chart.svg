<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#12121a"/>
  <!-- Axes -->
  <line x1="80" y1="340" x2="750" y2="340" stroke="#889" stroke-width="1" opacity="0.5"/>
  <line x1="80" y1="340" x2="80" y2="40" stroke="#889" stroke-width="1" opacity="0.5"/>
  <!-- Grid lines -->
  <g stroke="#889" stroke-width="0.3" opacity="0.2">
    <line x1="80" y1="280" x2="750" y2="280"/>
    <line x1="80" y1="220" x2="750" y2="220"/>
    <line x1="80" y1="160" x2="750" y2="160"/>
    <line x1="80" y1="100" x2="750" y2="100"/>
  </g>
  <!-- Power law curve (log-log would be straight; this shows the actual distribution shape) -->
  <path d="M 100 60 C 110 80, 120 120, 140 180 C 160 230, 200 280, 260 300 C 320 315, 400 325, 500 332 C 600 336, 700 338, 750 339" stroke="#f0c27f" stroke-width="2.5" fill="none"/>
  <!-- Fill under curve -->
  <path d="M 100 60 C 110 80, 120 120, 140 180 C 160 230, 200 280, 260 300 C 320 315, 400 325, 500 332 C 600 336, 700 338, 750 339 L 750 340 L 100 340 Z" fill="url(#powerGrad)" opacity="0.3"/>
  <linearGradient id="powerGrad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#f0c27f"/>
    <stop offset="100%" stop-color="#f0c27f" stop-opacity="0"/>
  </linearGradient>
  <!-- Normal distribution for comparison (dashed) -->
  <path d="M 100 335 C 200 330, 300 300, 380 200 C 420 150, 440 130, 460 130 C 480 130, 500 150, 540 200 C 620 300, 700 330, 750 335" stroke="#6a82fb" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.6"/>
  <!-- Annotations -->
  <!-- The "fat tail" region -->
  <rect x="85" y="45" width="80" height="30" rx="4" fill="rgba(240,194,127,0.15)" stroke="#f0c27f" stroke-width="0.5"/>
  <text x="125" y="65" font-family="Inter, sans-serif" font-size="11" fill="#f0c27f" text-anchor="middle">Top 1%</text>
  <!-- Arrow pointing to tail -->
  <line x1="550" y1="310" x2="680" y2="336" stroke="#889" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="580" y="300" font-family="Inter, sans-serif" font-size="10" fill="#889">The long tail: 47% uncited</text>
  <!-- Legend -->
  <line x1="550" y1="60" x2="580" y2="60" stroke="#f0c27f" stroke-width="2.5"/>
  <text x="590" y="64" font-family="Inter, sans-serif" font-size="11" fill="#e0e0e8">Power law (α ≈ 3.16)</text>
  <line x1="550" y1="82" x2="580" y2="82" stroke="#6a82fb" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="590" y="86" font-family="Inter, sans-serif" font-size="11" fill="#6a82fb">Normal distribution</text>
  <!-- Axis labels -->
  <text x="400" y="375" font-family="Inter, sans-serif" font-size="12" fill="#889" text-anchor="middle">Citations (rank ordered) →</text>
  <text x="30" y="200" font-family="Inter, sans-serif" font-size="12" fill="#889" text-anchor="middle" transform="rotate(-90, 30, 200)">Frequency →</text>
  <!-- Title -->
  <text x="400" y="25" font-family="Inter, sans-serif" font-size="14" fill="#e0e0e8" text-anchor="middle" font-weight="600">Citation Distribution: Power Law vs Normal</text>
</svg>
