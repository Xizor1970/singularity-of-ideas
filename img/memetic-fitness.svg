<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" fill="#12121a"/>
  <!-- Title -->
  <text x="400" y="28" font-family="Inter, sans-serif" font-size="13" fill="#e0e0e8" text-anchor="middle" font-weight="600">Memetic Fitness: Three Dimensions of Replicator Success</text>
  <!-- Three overlapping circles (Venn-style) -->
  <!-- Fidelity circle -->
  <circle cx="320" cy="200" r="120" fill="rgba(240,194,127,0.08)" stroke="#f0c27f" stroke-width="1.5"/>
  <text x="260" y="160" font-family="Inter, sans-serif" font-size="14" fill="#f0c27f" font-weight="700">Fidelity</text>
  <text x="260" y="178" font-family="Inter, sans-serif" font-size="9" fill="#889">Copying accuracy</text>
  <text x="260" y="195" font-family="Inter, sans-serif" font-size="8" fill="#e0e0e8" opacity="0.6">E = mc²</text>
  <text x="260" y="208" font-family="Inter, sans-serif" font-size="8" fill="#e0e0e8" opacity="0.6">Pythagorean theorem</text>
  <!-- Fecundity circle -->
  <circle cx="480" cy="200" r="120" fill="rgba(106,130,251,0.08)" stroke="#6a82fb" stroke-width="1.5"/>
  <text x="530" y="160" font-family="Inter, sans-serif" font-size="14" fill="#6a82fb" font-weight="700">Fecundity</text>
  <text x="530" y="178" font-family="Inter, sans-serif" font-size="9" fill="#889">Spread rate</text>
  <text x="530" y="195" font-family="Inter, sans-serif" font-size="8" fill="#e0e0e8" opacity="0.6">Viral memes</text>
  <text x="530" y="208" font-family="Inter, sans-serif" font-size="8" fill="#e0e0e8" opacity="0.6">Breaking news</text>
  <!-- Longevity circle -->
  <circle cx="400" cy="300" r="120" fill="rgba(85,170,153,0.08)" stroke="#5a9" stroke-width="1.5"/>
  <text x="400" y="350" font-family="Inter, sans-serif" font-size="14" fill="#5a9" font-weight="700" text-anchor="middle">Longevity</text>
  <text x="400" y="368" font-family="Inter, sans-serif" font-size="9" fill="#889" text-anchor="middle">Persistence in host</text>
  <text x="400" y="385" font-family="Inter, sans-serif" font-size="8" fill="#e0e0e8" opacity="0.6" text-anchor="middle">Religious beliefs • Democracy</text>
  <!-- Center intersection (all three = dominant idea) -->
  <circle cx="400" cy="230" r="30" fill="rgba(240,194,127,0.15)" stroke="#f0c27f" stroke-width="1"/>
  <text x="400" y="225" font-family="Inter, sans-serif" font-size="9" fill="#f0c27f" text-anchor="middle" font-weight="700">DOMINANT</text>
  <text x="400" y="238" font-family="Inter, sans-serif" font-size="8" fill="#f0c27f" text-anchor="middle">IDEA</text>
  <!-- Examples in intersections -->
  <!-- Fidelity + Fecundity -->
  <text x="400" y="150" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">"Survival of</text>
  <text x="400" y="161" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">the fittest"</text>
  <!-- Fidelity + Longevity -->
  <text x="320" y="280" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">Mathematical</text>
  <text x="320" y="291" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">proofs</text>
  <!-- Fecundity + Longevity -->
  <text x="480" y="280" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">Political</text>
  <text x="480" y="291" font-family="Inter, sans-serif" font-size="8" fill="#889" text-anchor="middle">ideologies</text>
  <!-- Sidebar: speed comparison -->
  <rect x="620" y="60" width="155" height="140" rx="6" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="697" y="82" font-family="Inter, sans-serif" font-size="9" fill="#889" text-anchor="middle">SPREAD SPEED</text>
  <text x="640" y="105" font-family="Inter, sans-serif" font-size="9" fill="#fc5c7d">●</text>
  <text x="655" y="105" font-family="Inter, sans-serif" font-size="9" fill="#e0e0e8">Internet meme: ~hours</text>
  <text x="640" y="125" font-family="Inter, sans-serif" font-size="9" fill="#f0c27f">●</text>
  <text x="655" y="125" font-family="Inter, sans-serif" font-size="9" fill="#e0e0e8">Pop science: ~months</text>
  <text x="640" y="145" font-family="Inter, sans-serif" font-size="9" fill="#6a82fb">●</text>
  <text x="655" y="145" font-family="Inter, sans-serif" font-size="9" fill="#e0e0e8">Academic idea: ~years</text>
  <text x="640" y="165" font-family="Inter, sans-serif" font-size="9" fill="#5a9">●</text>
  <text x="655" y="165" font-family="Inter, sans-serif" font-size="9" fill="#e0e0e8">Paradigm: ~decades</text>
  <text x="640" y="185" font-family="Inter, sans-serif" font-size="9" fill="#889">●</text>
  <text x="655" y="185" font-family="Inter, sans-serif" font-size="9" fill="#e0e0e8">Math truth: ∞</text>
</svg>
