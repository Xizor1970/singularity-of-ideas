<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#0a0a0f"/>
  <!-- Generative art: converging lines representing ideas flowing toward a singularity point -->
  <!-- Central convergence glow -->
  <radialGradient id="singGlow">
    <stop offset="0%" stop-color="#f0c27f" stop-opacity="0.15"/>
    <stop offset="40%" stop-color="#f0c27f" stop-opacity="0.03"/>
    <stop offset="100%" stop-color="#f0c27f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="600" cy="250" r="250" fill="url(#singGlow)"/>
  <!-- Converging lines (ideas flowing to center) -->
  <g stroke="#f0c27f" opacity="0.12">
    <line x1="0" y1="50" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="250" y1="0" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="400" y1="0" x2="600" y2="250" stroke-width="0.7"/>
    <line x1="600" y1="0" x2="600" y2="250" stroke-width="0.8"/>
    <line x1="800" y1="0" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="1200" y1="50" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="0" y1="250" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="0" y1="350" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="0" y1="450" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="100" y1="500" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="300" y1="500" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="500" y1="500" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="700" y1="500" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="900" y1="500" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="1100" y1="500" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="1200" y1="150" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="1200" y1="250" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="1200" y1="350" x2="600" y2="250" stroke-width="0.4"/>
    <line x1="1200" y1="450" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="50" y1="100" x2="600" y2="250" stroke-width="0.3"/>
    <line x1="1150" y1="100" x2="600" y2="250" stroke-width="0.3"/>
    <line x1="50" y1="400" x2="600" y2="250" stroke-width="0.3"/>
    <line x1="1150" y1="400" x2="600" y2="250" stroke-width="0.3"/>
  </g>
  <!-- Blue secondary convergence lines -->
  <g stroke="#6a82fb" opacity="0.06">
    <line x1="150" y1="30" x2="600" y2="250" stroke-width="0.8"/>
    <line x1="350" y1="20" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="700" y1="10" x2="600" y2="250" stroke-width="0.7"/>
    <line x1="1050" y1="30" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="200" y1="480" x2="600" y2="250" stroke-width="0.7"/>
    <line x1="450" y1="490" x2="600" y2="250" stroke-width="0.6"/>
    <line x1="800" y1="490" x2="600" y2="250" stroke-width="0.5"/>
    <line x1="1050" y1="470" x2="600" y2="250" stroke-width="0.6"/>
  </g>
  <!-- Small nodes along the lines (ideas in transit) -->
  <g fill="#f0c27f">
    <circle cx="150" cy="175" r="2" opacity="0.4"/>
    <circle cx="300" cy="125" r="2.5" opacity="0.5"/>
    <circle cx="200" cy="300" r="1.5" opacity="0.3"/>
    <circle cx="450" cy="100" r="2" opacity="0.5"/>
    <circle cx="380" cy="350" r="2" opacity="0.4"/>
    <circle cx="500" cy="200" r="3" opacity="0.6"/>
    <circle cx="700" cy="150" r="2" opacity="0.45"/>
    <circle cx="750" cy="300" r="2.5" opacity="0.5"/>
    <circle cx="850" cy="200" r="1.5" opacity="0.35"/>
    <circle cx="900" cy="350" r="2" opacity="0.4"/>
    <circle cx="1000" cy="180" r="2" opacity="0.4"/>
    <circle cx="1050" cy="300" r="1.5" opacity="0.3"/>
    <circle cx="480" cy="300" r="2" opacity="0.45"/>
    <circle cx="350" cy="220" r="1.5" opacity="0.35"/>
    <circle cx="720" cy="350" r="2" opacity="0.4"/>
  </g>
  <!-- Central singularity point -->
  <circle cx="600" cy="250" r="6" fill="#f0c27f" opacity="0.9"/>
  <circle cx="600" cy="250" r="12" fill="none" stroke="#f0c27f" stroke-width="1" opacity="0.5"/>
  <circle cx="600" cy="250" r="20" fill="none" stroke="#f0c27f" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="250" r="30" fill="none" stroke="#f0c27f" stroke-width="0.3" opacity="0.15"/>
</svg>
