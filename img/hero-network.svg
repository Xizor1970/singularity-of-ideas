<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" fill="none">
  <rect width="1200" height="500" fill="#0a0a0f"/>
  <!-- Network nodes and edges - generative art style -->
  <!-- Edges first (behind nodes) -->
  <g stroke="rgba(240,194,127,0.12)" stroke-width="0.8">
    <line x1="200" y1="120" x2="400" y2="200"/>
    <line x1="400" y1="200" x2="600" y2="150"/>
    <line x1="600" y1="150" x2="800" y2="250"/>
    <line x1="800" y1="250" x2="1000" y2="180"/>
    <line x1="200" y1="120" x2="350" y2="350"/>
    <line x1="350" y1="350" x2="600" y2="380"/>
    <line x1="600" y1="380" x2="800" y2="250"/>
    <line x1="600" y1="150" x2="600" y2="380"/>
    <line x1="400" y1="200" x2="350" y2="350"/>
    <line x1="800" y1="250" x2="950" y2="400"/>
    <line x1="1000" y1="180" x2="950" y2="400"/>
    <line x1="100" y1="280" x2="200" y2="120"/>
    <line x1="100" y1="280" x2="350" y2="350"/>
    <line x1="150" y1="420" x2="350" y2="350"/>
    <line x1="150" y1="420" x2="100" y2="280"/>
    <line x1="450" y1="80" x2="600" y2="150"/>
    <line x1="450" y1="80" x2="400" y2="200"/>
    <line x1="750" y1="100" x2="800" y2="250"/>
    <line x1="750" y1="100" x2="600" y2="150"/>
    <line x1="1050" y1="350" x2="1000" y2="180"/>
    <line x1="1050" y1="350" x2="950" y2="400"/>
    <line x1="500" y1="450" x2="600" y2="380"/>
    <line x1="500" y1="450" x2="350" y2="350"/>
    <line x1="700" y1="430" x2="600" y2="380"/>
    <line x1="700" y1="430" x2="950" y2="400"/>
    <line x1="300" y1="50" x2="200" y2="120"/>
    <line x1="300" y1="50" x2="450" y2="80"/>
    <line x1="900" y1="80" x2="1000" y2="180"/>
    <line x1="900" y1="80" x2="750" y2="100"/>
    <line x1="1100" y1="250" x2="1000" y2="180"/>
    <line x1="1100" y1="250" x2="1050" y2="350"/>
  </g>
  <!-- Secondary edges (dimmer) -->
  <g stroke="rgba(106,130,251,0.06)" stroke-width="0.5">
    <line x1="200" y1="120" x2="600" y2="380"/>
    <line x1="350" y1="350" x2="800" y2="250"/>
    <line x1="100" y1="280" x2="600" y2="150"/>
    <line x1="450" y1="80" x2="800" y2="250"/>
    <line x1="750" y1="100" x2="1050" y2="350"/>
    <line x1="500" y1="450" x2="950" y2="400"/>
  </g>
  <!-- Hub nodes (large, gold glow) -->
  <circle cx="600" cy="150" r="12" fill="#f0c27f" opacity="0.9"/>
  <circle cx="600" cy="150" r="20" fill="none" stroke="#f0c27f" stroke-width="0.5" opacity="0.3"/>
  <circle cx="600" cy="150" r="30" fill="none" stroke="#f0c27f" stroke-width="0.3" opacity="0.15"/>
  <circle cx="800" cy="250" r="10" fill="#f0c27f" opacity="0.8"/>
  <circle cx="800" cy="250" r="18" fill="none" stroke="#f0c27f" stroke-width="0.5" opacity="0.25"/>
  <circle cx="400" cy="200" r="9" fill="#f0c27f" opacity="0.75"/>
  <circle cx="400" cy="200" r="16" fill="none" stroke="#f0c27f" stroke-width="0.4" opacity="0.2"/>
  <!-- Medium nodes -->
  <circle cx="200" cy="120" r="6" fill="#6a82fb" opacity="0.7"/>
  <circle cx="350" cy="350" r="7" fill="#6a82fb" opacity="0.7"/>
  <circle cx="600" cy="380" r="6" fill="#6a82fb" opacity="0.65"/>
  <circle cx="1000" cy="180" r="7" fill="#6a82fb" opacity="0.7"/>
  <circle cx="950" cy="400" r="5" fill="#6a82fb" opacity="0.6"/>
  <!-- Small peripheral nodes -->
  <circle cx="100" cy="280" r="3" fill="#e0e0e8" opacity="0.4"/>
  <circle cx="150" cy="420" r="3" fill="#e0e0e8" opacity="0.35"/>
  <circle cx="450" cy="80" r="4" fill="#e0e0e8" opacity="0.45"/>
  <circle cx="750" cy="100" r="4" fill="#e0e0e8" opacity="0.4"/>
  <circle cx="1050" cy="350" r="3.5" fill="#e0e0e8" opacity="0.4"/>
  <circle cx="500" cy="450" r="3" fill="#e0e0e8" opacity="0.35"/>
  <circle cx="700" cy="430" r="3" fill="#e0e0e8" opacity="0.35"/>
  <circle cx="300" cy="50" r="3" fill="#e0e0e8" opacity="0.3"/>
  <circle cx="900" cy="80" r="3" fill="#e0e0e8" opacity="0.35"/>
  <circle cx="1100" cy="250" r="3" fill="#e0e0e8" opacity="0.35"/>
  <!-- Subtle radial glow in center -->
  <radialGradient id="glow">
    <stop offset="0%" stop-color="#f0c27f" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#f0c27f" stop-opacity="0"/>
  </radialGradient>
  <circle cx="600" cy="250" r="300" fill="url(#glow)"/>
</svg>
